name: Project board automation

# Drives card status on project 1 (https://github.com/users/jeremypruitt/projects/1)
# in response to issue + PR lifecycle events. See docs/agents/issue-tracker.md
# §"Project board automation" for the full transition table and the
# `PROJECT_PAT` secret setup required to grant project scope.

on:
  issues:
    types: [opened, labeled, closed, reopened]
  pull_request:
    types: [opened, ready_for_review, converted_to_draft, closed, reopened]
  schedule:
    # Reconcile Score → Priority + label every 15 minutes. Catches manual
    # board edits to Score that bypass Claude's inline writes. user-owned
    # ProjectsV2 doesn't fire `projects_v2_item` events to repo workflows
    # so this is the only path for board-side edits to propagate.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  PROJECT_ID: PVT_kwHOAAE0oM4BXFC0
  STATUS_FIELD_ID: PVTSSF_lAHOAAE0oM4BXFC0zhSUcro
  STATUS_BACKLOG: a18af1e3
  STATUS_READY: 0855fb61
  STATUS_IN_PROGRESS: 7c242164
  STATUS_VALIDATING: f5779989
  STATUS_DONE: a8a3d908
  SCORE_FIELD_ID: PVTF_lAHOAAE0oM4BXFC0zhSUczU
  PRIORITY_FIELD_ID: PVTSSF_lAHOAAE0oM4BXFC0zhSUcyc
  PRIORITY_OPT_CRIT: c3817455
  PRIORITY_OPT_TOP: c34e5106
  PRIORITY_OPT_HIGH: 695030ca
  PRIORITY_OPT_MED: 8401f72b
  PRIORITY_OPT_LOW: 77940e7e

jobs:
  sync:
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
    steps:
      - name: Determine target status from event
        id: status
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -euo pipefail
          STATE=""
          case "$EVENT_NAME.$EVENT_ACTION" in
            issues.opened|issues.reopened)
              STATE="$STATUS_BACKLOG"
              ;;
            issues.labeled)
              if [[ "$LABEL_NAME" == "ready-for-agent" || "$LABEL_NAME" == "ready-for-human" ]]; then
                STATE="$STATUS_READY"
              fi
              ;;
            issues.closed)
              STATE="$STATUS_DONE"
              ;;
            pull_request.opened|pull_request.reopened)
              if [[ "$PR_DRAFT" == "true" ]]; then
                STATE="$STATUS_IN_PROGRESS"
              else
                STATE="$STATUS_VALIDATING"
              fi
              ;;
            pull_request.ready_for_review)
              STATE="$STATUS_VALIDATING"
              ;;
            pull_request.converted_to_draft)
              STATE="$STATUS_IN_PROGRESS"
              ;;
            pull_request.closed)
              STATE="$STATUS_DONE"
              ;;
          esac
          if [[ -z "$STATE" ]]; then
            echo "no-op for $EVENT_NAME.$EVENT_ACTION"
          fi
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      - name: Sync content + linked issues to status
        if: steps.status.outputs.state != ''
        env:
          STATE: ${{ steps.status.outputs.state }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          set -euo pipefail

          # Build the list of node IDs to sync.
          declare -a CONTENT_IDS
          if [[ "$EVENT_NAME" == "issues" ]]; then
            CONTENT_IDS+=("$ISSUE_NODE_ID")
          else
            CONTENT_IDS+=("$PR_NODE_ID")

            # PR closed without merge → only update the PR card; leave linked issues alone.
            if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" == "closed" && "$PR_MERGED" != "true" ]]; then
              echo "PR closed without merge — skipping linked-issue updates"
            else
              # Resolve linked issues via closingIssuesReferences.
              while IFS= read -r issue_node; do
                [[ -n "$issue_node" ]] && CONTENT_IDS+=("$issue_node")
              done < <(gh api graphql \
                -f query='query($id: ID!) {
                  node(id: $id) {
                    ... on PullRequest {
                      closingIssuesReferences(first: 20) { nodes { id } }
                    }
                  }
                }' \
                -F id="$PR_NODE_ID" \
                --jq '.data.node.closingIssuesReferences.nodes[].id')
            fi
          fi

          for CID in "${CONTENT_IDS[@]}"; do
            # Add to project — idempotent: returns the existing item if already added.
            ITEM_ID=$(gh api graphql \
              -f query='mutation($project: ID!, $content: ID!) {
                addProjectV2ItemById(input: {projectId: $project, contentId: $content}) {
                  item { id }
                }
              }' \
              -F project="$PROJECT_ID" \
              -F content="$CID" \
              --jq '.data.addProjectV2ItemById.item.id')

            # Set status.
            gh api graphql \
              -f query='mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project,
                  itemId: $item,
                  fieldId: $field,
                  value: { singleSelectOptionId: $value }
                }) {
                  projectV2Item { id }
                }
              }' \
              -F project="$PROJECT_ID" \
              -F item="$ITEM_ID" \
              -F field="$STATUS_FIELD_ID" \
              -F value="$STATE" > /dev/null

            echo "synced $CID → $STATE"
          done

  priority-reconcile:
    # Periodic reconciliation: derives band from Score and writes Priority
    # single-select + band label for every open issue. Catches manual board
    # edits that bypass Claude's inline writes. Idempotent — items already
    # in the correct state are skipped (no API write).
    #
    # User-owned ProjectsV2 doesn't deliver `projects_v2_item` events to
    # repo workflows, so cron is the only path for Score-on-board edits to
    # propagate. Lag = up to 15 min; acceptable for a manual workflow where
    # Claude writes the trio inline at scoring time.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
    steps:
      - name: Reconcile Score → Priority + label across all open issues
        run: |
          set -euo pipefail

          # Paginate through every project item; collect open Issues with Score set.
          : > /tmp/work.tsv
          AFTER=""
          while :; do
            ARGS=(-f query='
              query($after: String) {
                user(login: "jeremypruitt") {
                  projectV2(number: 1) {
                    items(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        content {
                          __typename
                          ... on Issue {
                            number
                            state
                            repository { nameWithOwner }
                            labels(first: 50) { nodes { name } }
                          }
                        }
                        score: fieldValueByName(name: "Score") {
                          ... on ProjectV2ItemFieldNumberValue { number }
                        }
                        priority: fieldValueByName(name: "Priority") {
                          ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                        }
                      }
                    }
                  }
                }
              }')
            if [[ -n "$AFTER" ]]; then ARGS+=(-F after="$AFTER"); fi
            PAYLOAD=$(gh api graphql "${ARGS[@]}")

            echo "$PAYLOAD" | jq -r '.data.user.projectV2.items.nodes[]
              | select(.content.__typename == "Issue"
                       and .content.state == "OPEN"
                       and .score.number != null)
              | [
                  .id,
                  (.content.number|tostring),
                  .content.repository.nameWithOwner,
                  (.score.number|tostring),
                  (.priority.optionId // ""),
                  ([.content.labels.nodes[].name]
                    | map(select(. == "crit" or . == "top" or . == "high" or . == "med" or . == "low"))
                    | sort | join(","))
                ] | @tsv' >> /tmp/work.tsv

            HAS_NEXT=$(echo "$PAYLOAD" | jq -r '.data.user.projectV2.items.pageInfo.hasNextPage')
            [[ "$HAS_NEXT" == "true" ]] || break
            AFTER=$(echo "$PAYLOAD" | jq -r '.data.user.projectV2.items.pageInfo.endCursor')
          done

          TOTAL=$(wc -l < /tmp/work.tsv)
          DRIFT=0
          while IFS=$'\t' read -r ITEM_ID NUM REPO SCORE CUR_OPT CUR_BAND_LABELS; do
            SCORE_INT=$(printf '%.0f' "$SCORE")
            if (( SCORE_INT > 100 )); then SCORE_INT=100; fi
            if (( SCORE_INT < 1 )); then SCORE_INT=1; fi

            if   (( SCORE_INT >= 50 )); then BAND="crit"; OPT="$PRIORITY_OPT_CRIT"
            elif (( SCORE_INT >= 25 )); then BAND="top";  OPT="$PRIORITY_OPT_TOP"
            elif (( SCORE_INT >= 13 )); then BAND="high"; OPT="$PRIORITY_OPT_HIGH"
            elif (( SCORE_INT >= 5  )); then BAND="med";  OPT="$PRIORITY_OPT_MED"
            else                            BAND="low";  OPT="$PRIORITY_OPT_LOW"
            fi

            CHANGED=0
            if [[ "$CUR_OPT" != "$OPT" ]]; then
              gh api graphql -f query='
                mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
                  updateProjectV2ItemFieldValue(input: {projectId: $p, itemId: $i, fieldId: $f, value: {singleSelectOptionId: $v}}) {
                    projectV2Item { id }
                  }
                }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$PRIORITY_FIELD_ID" -F v="$OPT" >/dev/null
              CHANGED=1
            fi

            if [[ "$CUR_BAND_LABELS" != "$BAND" ]]; then
              REMOVE=""
              for L in crit top high med low; do
                [[ "$L" != "$BAND" ]] && REMOVE+="${REMOVE:+,}$L"
              done
              gh issue edit "$NUM" --repo "$REPO" --add-label "$BAND" --remove-label "$REMOVE" >/dev/null 2>&1 || true
              CHANGED=1
            fi

            if (( CHANGED )); then
              DRIFT=$((DRIFT + 1))
              echo "reconciled #$NUM score=$SCORE_INT → $BAND"
            fi
          done < /tmp/work.tsv

          echo "Reconciled $DRIFT of $TOTAL scored items"
